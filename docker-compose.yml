services:
  backend:
    build: 
      context: ./conduit-backend
      dockerfile: Dockerfile
    ports:
      - "8000"
    volumes:
      - backend-static:/app/staticfiles
    environment:
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE:-conduit.settings}
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME:-admin}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL:-admin@example.com}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD:-change-this-password}
      - ALLOWED_HOSTS=*
      - DEBUG=${DEBUG:-True}
    networks:
      - conduit-network

  frontend:
    build:
      context: ./conduit-frontend
      dockerfile: Dockerfile
    ports:
      - "8282:8282"
    depends_on:
      - backend
    networks:
      - conduit-network

volumes:
  backend-static:

networks:
  conduit-network:
           driver: bridge