name: Deployment

on:
  push:
    branches:
      [main, feature/*]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io

jobs:
  # Job 1: Build & Push
  # The application build happens here on the GitHub runner.
  # Frontend and backend each have their own Dockerfile; they are built
  # separately via a matrix and pushed as standalone images to the
  # GitHub Container Registry (ghcr.io).
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - service: frontend
            context: ./conduit-frontend
            dockerfile: ./conduit-frontend/Dockerfile
          - service: backend
            context: ./conduit-backend
            dockerfile: ./conduit-backend/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GHCR only allows lowercase characters in image names, but
      # github.repository can contain uppercase letters -> normalize it.
      - name: Get repository name in lowercase
        id: repo-name
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: "Build and push ${{ matrix.service }} image"
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.repo-name.outputs.name }}:${{ matrix.service }}-latest
            ${{ env.REGISTRY }}/${{ steps.repo-name.outputs.name }}:${{ matrix.service }}-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }}
  # Job 2: Deploy to Cloud VM
  # Opens an SSH connection to the target cloud VM and rolls out the
  # application there. No build happens on the VM - it only pulls the
  # frontend and backend images that were just built and pushed to
  # ghcr.io by the build-and-push job above, then (re)starts the whole
  # stack (frontend, backend, database) via docker compose in detached
  # mode. Steps performed on the VM, in order:
  #   1. Log in to ghcr.io using the ephemeral GITHUB_TOKEN
  #   2. Derive IMAGE_NAMESPACE/IMAGE_TAG so docker-compose.yml resolves
  #      to the exact images built for this commit
  #   3. docker compose pull   - fetch the new images, no local build
  #   4. docker compose up -d  - (re)start containers in detached mode
  #   5. docker image prune -f - clean up old, unused images
  # set -euo pipefail (both locally and on the VM) ensures the whole job
  # fails immediately if any of these steps errors out.
  deploy-to-cloud-vm:
    name: Deploy to Cloud VM
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # Load the SSH key into the runner (ssh-agent) instead of using the
      # error-prone appleboy/ssh-action Docker wrapper. More robust, since
      # this uses the runner's plain, native ssh client.
      - name: Start ssh-agent and load key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host key to known_hosts (avoids interactive prompt)
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.CLOUD_VM_PORT }}" "${{ secrets.CLOUD_VM_HOST }}" >> ~/.ssh/known_hosts
            # Generates the .env file from GitHub Secrets, entirely on the

      # runner's filesystem. It is never printed to the logs (GitHub
      # Actions automatically masks any secret value that appears in
      # log output, but we also never `cat` the file, so it stays out
      # of the log entirely). The file is deleted again at the very end
      # of this job, regardless of success or failure.
      - name: Generate .env from GitHub Secrets
        env:
          DEBUG: ${{ secrets.DEBUG }}
          ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS }}
          DJANGO_SETTINGS_MODULE: ${{ secrets.DJANGO_SETTINGS_MODULE }}
          DJANGO_SUPERUSER_USERNAME: ${{ secrets.DJANGO_SUPERUSER_USERNAME }}
          DJANGO_SUPERUSER_EMAIL: ${{ secrets.DJANGO_SUPERUSER_EMAIL }}
          DJANGO_SUPERUSER_PASSWORD: ${{ secrets.DJANGO_SUPERUSER_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          CC_SECRET_KEY: ${{ secrets.CC_SECRET_KEY }}
          IMAGE_NAMESPACE: ${{secrets.IMAGE_NAMESPACE}}
          IMAGE_TAG: ${{secrets.IMAGE_TAG}}
        run: |
          set -euo pipefail
          cat > .env.deploy << EOF
          DEBUG=${DEBUG}
          ALLOWED_HOSTS=${ALLOWED_HOSTS}
          DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE}
          DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME}
          DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL}
          DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD}
          DB_NAME=${DB_NAME}
          DB_USER=${DB_USER}
          DB_PASSWORD=${DB_PASSWORD}
          DB_HOST=db
          DB_PORT=5432
          CC_SECRET_KEY=${CC_SECRET_KEY}
          IMAGE_NAMESPACE: ${IMAGE_NAMESPACE}
          IMAGE_TAG: ${IMAGE_TAG}
          EOF
          chmod 600 .env.deploy

      # Copies docker-compose.yml and the freshly generated .env.deploy to
      # the VM, using the same ssh-agent/key loaded above - no extra login.
      - name: Copy docker-compose.yml and .env to the VM
        env:
          VM_HOST: ${{ secrets.CLOUD_VM_HOST }}
          VM_USER: ${{ secrets.CLOUD_VM_USER }}
          VM_PORT: ${{ secrets.CLOUD_VM_PORT }}
        run: |
          set -euo pipefail
          scp -P "${VM_PORT}" docker-compose.yml \
            "${VM_USER}@${VM_HOST}:~/project/conduit-deployment/conduit-container/docker-compose.yml"
          scp -P "${VM_PORT}" .env.deploy \
            "${VM_USER}@${VM_HOST}:~/project/conduit-deployment/conduit-container/.env"

      - name: Open SSH connection to the VM and run the deployment
        env:
          VM_HOST: ${{ secrets.CLOUD_VM_HOST }}
          VM_USER: ${{ secrets.CLOUD_VM_USER }}
          VM_PORT: ${{ secrets.CLOUD_VM_PORT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          ssh -p "${VM_PORT}" "${VM_USER}@${VM_HOST}" bash -s << EOF
            set -euo pipefail

            cd ~/project/conduit-deployment/conduit-container

            echo "${GH_TOKEN}" | docker login ghcr.io -u "${GH_ACTOR}" --password-stdin

            export IMAGE_NAMESPACE="\$(echo '${GH_REPO}' | tr '[:upper:]' '[:lower:]')"
            export IMAGE_TAG="${GH_SHA}"

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
          EOF

      # Removes the locally generated .env.deploy from the runner's
      # workspace again. Runs even if a previous step failed, so no
      # secret material lingers in the job's file system.
      - name: Clean up local .env file
        if: always()
        run: rm -f .env.deploy
