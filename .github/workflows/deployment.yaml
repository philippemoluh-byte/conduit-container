  name: Deployment
  on:
    push:
      branches:
        - feature/conduit-deployment

  env:
    REGISTRY: ghcr.io

  jobs:
    # Job 1: Build & Push
    # Der Build der Anwendung findet hier auf dem GitHub-Runner statt,
    # Frontend und Backend besitzen jeweils ein eigenes Dockerfile
    # sie werden über eine Matrix separat gebaut und als eigenständige Images
    # in die GitHub Container Registry (ghcr.io) gepusht.
    build-and-push:
      name: Build and Push Docker Image
      runs-on: ubuntu-latest
      permissions:
        contents: read
        packages: write
      strategy:
        fail-fast: true
        matrix:
          include:
            - service: frontend
              context: ./conduit-frontend
              dockerfile: ./conduit-frontend/Dockerfile
            - service: backend
              context: ./conduit-backend
              dockerfile: ./conduit-backend/Dockerfile
      steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Log in to DockerHub
          uses: docker/login-action@v2
          with:
            registry: ${{ env.REGISTRY }}
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Repository-Name in kleinbuchstaben ermiitteln
          id: repo-name
          run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

        - name: "${{matrix.service}}-Image build and in Regitry pushen"
          uses: docker/build-push-action@v5
          with:
            context: ${{ matrix.context }}
            file: ${{ matrix.dockerfile }}
            push: true
            tags: |
                ${{ env.REGISTRY }}/${{ steps.repo-name.outputs.name }}:${{ matrix.service }}-latest
                ${{ env.REGISTRY }}/${{ steps.repo-name.outputs.name }}:${{ matrix.service }}-${{ github.sha }}
            cache-from: type=gha,scope=${{ matrix.service }}
            cache-to: type=gha,scope=${{ matrix.service }}


    deploy-to-cloud-vm:
      name: Deploy to Cloud VM
      needs: build-and-push
      runs-on: ubuntu-latest
      steps:
        # SSH-Key im Runner laden (ssh-agent), statt den fehleranfälligen
        # appleboy/ssh-action-Docker-Wrapper zu nutzen. Robuster, da hier
        # der ganz normale, native ssh-Client des Runners verwendet wird.
        - name: SSH-Agent starten und Key laden
          uses: webfactory/ssh-agent@v0.9.0
          with:
            ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

        - name: Host-Key bekannt machen (verhindert Interaktions-Prompt)
          run: |
            mkdir -p ~/.ssh
            ssh-keyscan -p "${{ secrets.CLOUD_VM_PORT }}" "${{ secrets.CLOUD_VM_HOST }}" >> ~/.ssh/known_hosts

        - name: User-Wert debuggen (temporär, danach wieder entfernen)
          run: |
            echo "Länge: ${#VM_USER}"
            echo "$VM_USER" | od -c | head -5
          env:
            VM_USER: ${{ secrets.CLOUD_VM_USER }}

        - name: SSH-Verbindung zur VM öffnen und Deployment ausführen
          env:
            VM_HOST: ${{ secrets.CLOUD_VM_HOST }}
            VM_USER: ${{ secrets.CLOUD_VM_USER }}
            VM_PORT: ${{ secrets.CLOUD_VM_PORT }}
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            GH_ACTOR: ${{ github.actor }}
            GH_REPO: ${{ github.repository }}
            GH_SHA: ${{ github.sha }}
          run: |
            set -euo pipefail
            
            ssh -p "${VM_PORT}" "${VM_USER}@${VM_HOST}" bash -s << EOF
              set -euo pipefail
            
              cd ~/project/conduit-deployment/conduit-container
            
              echo "${GH_TOKEN}" | docker login ghcr.io -u "${GH_ACTOR}" --password-stdin
            
              export IMAGE_NAMESPACE="\$(echo '${GH_REPO}' | tr '[:upper:]' '[:lower:]')"
              export IMAGE_TAG="${GH_SHA}"
            
              docker compose pull
              docker compose up -d --remove-orphans
              docker image prune -f
            EOF