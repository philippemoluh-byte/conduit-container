  name: Deployment
  on:
    push:
      branches:
        - feature/conduit-deployment

  env:
    REGISTRY: ghcr.io

  jobs:
    # Job 1: Build & Push
    # Der Build der Anwendung findet hier auf dem GitHub-Runner statt,
    # Frontend und Backend besitzen jeweils ein eigenes Dockerfile
    # sie werden über eine Matrix separat gebaut und als eigenständige Images
    # in die GitHub Container Registry (ghcr.io) gepusht.
    build-and-push:
      name: Build and Push Docker Image
      runs-on: ubuntu-latest
      permissions:
        contents: read
        packages: write
      strategy:
        fail-fast: true
        matrix:
          include:
            - service: frontend
              context: ./conduit-frontend
              dockerfile: ./conduit-frontend/Dockerfile
            - service: backend
              context: ./conduit-backend
              dockerfile: ./conduit-backend/Dockerfile
      steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Log in to DockerHub
          uses: docker/login-action@v2
          with:
            registry: ${{ env.REGISTRY }}
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Repository-Name in kleinbuchstaben ermiitteln
          id: repo-name
          run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

        - name: "${{matrix.service}}-Image build and in Regitry pushen"
          uses: docker/build-push-action@v5
          with:
            context: ${{ matrix.context }}
            file: ${{ matrix.dockerfile }}
            push: true
            tags: |
                ${{ env.REGISTRY }}/${{ steps.repo-name.outputs.name }}:${{ matrix.service }}-latest
                ${{ env.REGISTRY }}/${{ steps.repo-name.outputs.name }}:${{ matrix.service }}-${{ github.sha }}
            cache-from: type=gha,scope=${{ matrix.service }}
            cache-to: type=gha,scope=${{ matrix.service }}

    deploy-to-cloud-vm:
      name: Deploy to Cloud VM
      needs: build-and-push
      runs-on: ubuntu-latest

      steps:
        - name: ssh-connection to cloud vm open and run deployment commands
          uses: appleboy/ssh-action@v1.0.3
          with:
              host: ${{ secrets.CLOUD_VM_HOST }}
              username: ${{ secrets.CLOUD_VM_USER }}
              key: ${{ secrets.SSH_PRIVATE_KEY }}
              port: ${{ secrets.VM_PORT }}
              script-stop: true
              script: |
                set -euo pipefail
                
                cd project/conduit-deployment/conduit-container
                
                echo "${{secrets.GITHUB_TOKEN}} | docker login ghcr.io -u ${{ secrets.GITHUB_ACTOR }} --password-stdin"
                export IMAGE_NAMESPACE=$(echo "${GITHUB_REPOSITORY,,}" | tr '[:upper:]' '[:lower:]')
                export IMAGE_TAG= "${GITHUB_SHA}"
                
                echo "the ready built images are pulled from the GitHub Container Registry to the cloud vm"
                docker compose pull
                
                echo "the pulled images are started on the cloud vm"
                docker compose up -d --remove-orphans
                
                echo "the old images are removed from the cloud vm"
                docker image prune -f