name: Deployment

on:
  push:
    branches:
      - feature/conduit-deployment
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io

jobs:
  # Job 1: Build & Push
  # The application build happens here on the GitHub runner.
  # Frontend and backend each have their own Dockerfile; they are built
  # separately via a matrix and pushed as standalone images to the
  # GitHub Container Registry (ghcr.io).
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - service: frontend
            context: ./conduit-frontend
            dockerfile: ./conduit-frontend/Dockerfile
          - service: backend
            context: ./conduit-backend
            dockerfile: ./conduit-backend/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GHCR only allows lowercase characters in image names, but
      # github.repository can contain uppercase letters -> normalize it.
      - name: Get repository name in lowercase
        id: repo-name
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: "Build and push ${{ matrix.service }} image"
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.repo-name.outputs.name }}:${{ matrix.service }}-latest
            ${{ env.REGISTRY }}/${{ steps.repo-name.outputs.name }}:${{ matrix.service }}-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }}
  # Job 2: Deploy to Cloud VM
  # Opens an SSH connection to the target cloud VM and rolls out the
  # application there. No build happens on the VM - it only pulls the
  # frontend and backend images that were just built and pushed to
  # ghcr.io by the build-and-push job above, then (re)starts the whole
  # stack (frontend, backend, database) via docker compose in detached
  # mode. Steps performed on the VM, in order:
  #   1. Log in to ghcr.io using the ephemeral GITHUB_TOKEN
  #   2. Derive IMAGE_NAMESPACE/IMAGE_TAG so docker-compose.yml resolves
  #      to the exact images built for this commit
  #   3. docker compose pull   - fetch the new images, no local build
  #   4. docker compose up -d  - (re)start containers in detached mode
  #   5. docker image prune -f - clean up old, unused images
  # set -euo pipefail (both locally and on the VM) ensures the whole job
  # fails immediately if any of these steps errors out.
  deploy-to-cloud-vm:
    name: Deploy to Cloud VM
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # Load the SSH key into the runner (ssh-agent) instead of using the
      # error-prone appleboy/ssh-action Docker wrapper. More robust, since
      # this uses the runner's plain, native ssh client.
      - name: Start ssh-agent and load key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host key to known_hosts (avoids interactive prompt)
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.CLOUD_VM_PORT }}" "${{ secrets.CLOUD_VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Open SSH connection to the VM and run the deployment
        env:
          VM_HOST: ${{ secrets.CLOUD_VM_HOST }}
          VM_USER: ${{ secrets.CLOUD_VM_USER }}
          VM_PORT: ${{ secrets.CLOUD_VM_PORT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          ssh -p "${VM_PORT}" "${VM_USER}@${VM_HOST}" bash -s << EOF
            set -euo pipefail

            cd ~/project/conduit-deployment/conduit-container

            echo "${GH_TOKEN}" | docker login ghcr.io -u "${GH_ACTOR}" --password-stdin

            export IMAGE_NAMESPACE="\$(echo '${GH_REPO}' | tr '[:upper:]' '[:lower:]')"
            export IMAGE_TAG="${GH_SHA}"

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
          EOF
